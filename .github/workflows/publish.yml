name: Publish to GitHub Packages
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true
jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kadi1m'
      - run: npm install
      - name: Bump version on push/manual
        if: startsWith(github.ref, 'refs/tags/') == false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PUBLISHED=$(npm view @kadi1m/axiomvault-client version 2>/dev/null) || true
          PUBLISHED=${PUBLISHED:-0.0.0}
          NEXT=$(node -e "const p=(process.env.PUBLISHED||'0.0.0').split('.').map(Number); console.log([p[0]||0,p[1]||0,(p[2]||0)+1].join('.'))")
          npm version "$NEXT" --no-git-tag-version
          echo "Publishing version $(node -p "require('./package.json').version")"
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit and push version bump
        if: startsWith(github.ref, 'refs/tags/') == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: release $(node -p "require('./package.json').version") [skip ci]"
          git push
