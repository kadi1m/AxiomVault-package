name: Publish to GitHub Packages
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kadi1m'
      - name: Bump version on push/manual
        if: startsWith(github.ref, 'refs/tags/') == false
        run: npm version patch --no-git-tag-version
      - run: npm install
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit and push version bump
        if: startsWith(github.ref, 'refs/tags/') == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: release $(node -p "require('./package.json').version") [skip ci]"
          git push
